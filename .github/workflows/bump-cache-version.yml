name: Auto-bump cache version

# Runs on push to main. If any cache-busted asset under fosteringpathsproject/
# (.js, .jsx, .css, .html) actually changed in the push, replaces the "?v=..."
# tokens in fosteringpathsproject/index.html with the current short SHA and
# commits. Skips itself when the head commit is already an auto-bump (so no
# infinite loop), and skips entirely when the push touched no assets (so README
# / workflow / docs changes don't generate noise).

on:
  push:
    branches: [main]

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, 'auto-bump cache')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Did any cache-busted asset change in this push?
        id: check
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "First push to branch — bumping unconditionally."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" "$AFTER" -- \
              'fosteringpathsproject/**/*.js' \
              'fosteringpathsproject/**/*.jsx' \
              'fosteringpathsproject/**/*.css' \
              'fosteringpathsproject/**/*.html' \
              | grep -q .; then
            echo "Asset(s) changed — bumping."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No asset changes — skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump cache versions in index.html
        if: steps.check.outputs.changed == 'true'
        run: |
          SHA=$(git rev-parse --short HEAD)
          FILE="fosteringpathsproject/index.html"
          if [ ! -f "$FILE" ]; then
            echo "No $FILE found — nothing to bump."
            exit 0
          fi
          sed -i -E "s|\?v=[A-Za-z0-9_.-]+|?v=$SHA|g" "$FILE"
          echo "Bumped cache version to ?v=$SHA in $FILE"

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          if git diff --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fosteringpathsproject/index.html
          git commit -m "chore: auto-bump cache version"
          git push
