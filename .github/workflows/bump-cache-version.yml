name: Auto-bump cache version

# Runs on every push. If fosteringpathsproject/index.html has any "?v=..." cache
# busters on local script/style tags, replaces them with the current commit's
# short SHA, then commits the change. Skips itself when the commit is already
# the auto-bump commit (so no infinite loop).

on:
  push:
    branches: [main]

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, 'auto-bump cache')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the full ref so we can push back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump cache versions in index.html
        run: |
          SHA=$(git rev-parse --short HEAD)
          FILE="fosteringpathsproject/index.html"
          if [ ! -f "$FILE" ]; then
            echo "No $FILE found — nothing to bump."
            exit 0
          fi
          # Replace any existing ?v=<token> with ?v=<sha>
          sed -i -E "s|\?v=[A-Za-z0-9_.-]+|?v=$SHA|g" "$FILE"
          echo "Bumped cache version to ?v=$SHA in $FILE"

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fosteringpathsproject/index.html
          git commit -m "chore: auto-bump cache version"
          git push
